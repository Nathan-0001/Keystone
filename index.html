<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keystone Archaeology</title>
    <link rel="stylesheet" href="assets/CSS/styles.css">
    
</head>
<body>
    <div id="header"></div>
        <header class="keystone">
            <div class="carousel">
                <div class="carousel__track-container">
                    <button class="carousel__button carousel__button--left is-hidden" title="Previous slide">
                        <img src="assets/IMG/left.png" alt="">
                    </button>
                    <ul class="carousel__track">
                        <li class="carousel__slide current-slide"><img class="carousel__image" src="assets/IMG/carousel1.jpg" alt="Carousel image 1"></li>
                        <li class="carousel__slide"><img class="carousel__image" src="assets/IMG/carousel2.jpg" alt="Carousel image 2"></li>
                        <li class="carousel__slide"><img class="carousel__image" src="assets/IMG/carousel3.jpg" alt="Carousel image 3"></li>
                    </ul>
                    <button class="carousel__button carousel__button--right" title="Next slide">
                        <img src="assets/IMG/right.png" alt="">
                    </button>
                </div>
            </div>

        </header>
        <div class="keystone-box">
                <h1 >Keystone Archaeology</h1>
                <h3>Your gateway to the past</h3>
                <br />
                <p>Keystone Archaeology is a team of skilled archaeologists working hard to preserve the rich cultural heritage of the land, excavating and researching areas across the nation!</p>
            </div>
        <main>
        <div class="nothing"></div>
        </main>
        <div id="footer"></div>
<script src="assets/JS/script.js"></script>
</body>
</html>
